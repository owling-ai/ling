<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F2F2EF">
  <meta name="description" content="看看灵灵此刻的生活，收藏你们共同经历留下的信物。">
  <meta name="application-name" content="灵灵的窗口">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="灵灵">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <base href="/child/">
  <title>灵灵的窗口</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-world-mode="day">
  <div class="app-shell">
    <header class="app-header">
      <a class="wordmark" href="#now" aria-label="灵灵的窗口，返回现在">
        <span class="wordmark-mark" aria-hidden="true">灵</span>
        <span>灵灵的窗口</span>
      </a>
      <span id="mode-chip" class="mode-chip">积木日间</span>
    </header>

    <main id="view" tabindex="-1">
      <section class="loading-view" aria-label="正在打开灵灵的窗口" aria-busy="true">
        <div class="skeleton skeleton-media"></div>
        <div class="skeleton skeleton-line wide"></div>
        <div class="skeleton skeleton-line"></div>
      </section>
    </main>

    <nav class="tab-bar" aria-label="儿童端主导航">
      <a href="#now" data-tab="now">现在</a>
      <a href="#adventures" data-tab="adventures">奇遇</a>
      <a href="#pocket" data-tab="pocket">口袋</a>
    </nav>
  </div>

  <div id="announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <script type="module" src="./app.mjs"></script>
</body>
</html>
