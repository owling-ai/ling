<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2f2ef">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#171822">
  <meta name="color-scheme" content="light">
  <meta name="application-name" content="成长手册">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="成长手册">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="灵 Ling 家长端成长手册">
  <meta property="og:title" content="成长手册 | 灵 Ling">
  <meta property="og:description" content="理解成长、接住对话、预先设定守护边界。">
  <title>成长手册 | 灵 Ling</title>
  <link rel="manifest" href="/parent/manifest.webmanifest">
  <link rel="icon" href="/parent/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/parent/icon-192.png">
  <link rel="stylesheet" href="/parent/styles.css">
</head>
<body>
  <a class="skip-link" href="#app-main">跳到主要内容</a>

  <section id="welcome-view" class="welcome-view" aria-labelledby="welcome-title" hidden>
    <div class="welcome-content">
      <div class="welcome-copy">
        <p class="eyebrow">LING FAMILY</p>
        <h1 id="welcome-title">连接孩子和灵灵</h1>
        <p>孩子端扫码后，再用成长手册扫描同一张二维码</p>
      </div>

      <div class="block-scene" aria-hidden="true">
        <div class="block-house">
          <span class="house-roof"></span>
          <span class="house-body"></span>
          <span class="house-door"></span>
        </div>
        <span class="toy-block block-green"></span>
        <span class="toy-block block-blue"></span>
        <span class="toy-block block-pink"></span>
        <span class="toy-cone"></span>
        <div class="night-lamp">
          <span class="lamp-moon"></span>
          <span class="lamp-base"></span>
        </div>
      </div>

      <div class="welcome-actions">
        <section id="parent-binding" class="binding-panel" aria-labelledby="binding-title">
          <div class="binding-heading">
            <span class="binding-step" aria-hidden="true">2</span>
            <div>
              <h2 id="binding-title">家长确认</h2>
              <p>请扫描玩偶附带的二维码</p>
            </div>
          </div>
          <div id="binding-camera" class="binding-camera" hidden>
            <video id="binding-video" playsinline muted aria-label="二维码扫描画面"></video>
            <span class="scan-frame" aria-hidden="true"></span>
          </div>
          <button id="scan-binding-code" class="primary-button binding-scan-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3M8 9h8v6H8z"></path></svg>
            <span>扫描灵灵二维码</span>
          </button>
          <form id="binding-code-form" class="binding-code-form">
            <label for="binding-code">输入 Demo 码</label>
            <div>
              <input id="binding-code" name="code" placeholder="LING-DEMO-2026" autocomplete="off" autocapitalize="none" spellcheck="false" required>
              <button class="secondary-button" type="submit">确认</button>
            </div>
          </form>
          <p id="binding-status" class="binding-status" role="status" aria-live="polite">等待家长扫码</p>
        </section>

        <div id="binding-success" class="setup-list" aria-label="监护设置摘要" hidden>
          <div class="setup-row">
            <span class="setup-icon guardian-icon" aria-hidden="true"></span>
            <span>监护人身份</span>
            <strong>已确认</strong>
          </div>
          <div class="setup-row">
            <span class="setup-icon child-icon" aria-hidden="true">悠</span>
            <span>孩子称呼</span>
            <strong>悠悠</strong>
          </div>
        </div>
        <button id="start-app" class="primary-button" type="button" hidden>进入成长手册</button>
        <p class="welcome-footnote">绑定完成后，两端会看到同一个灵灵。</p>
      </div>
    </div>
  </section>

  <div id="app-shell" class="app-shell" hidden>
    <nav class="tab-bar" aria-label="成长手册主要页面">
      <div class="tab-list" role="tablist" aria-label="成长手册" aria-orientation="horizontal">
        <button id="tab-today" type="button" role="tab" aria-selected="true" aria-controls="panel-today" data-tab="today" tabindex="0">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path></svg>
          <span>今日</span>
        </button>
        <button id="tab-growth" type="button" role="tab" aria-selected="false" aria-controls="panel-growth" data-tab="growth" tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 4.7 18 2 18 2c1 5-1 10-5.2 12.4"></path><path d="M2 21c0-3 1.85-5.36 5.08-6.94C9.6 12.82 12.5 11.5 16 8"></path></svg>
          <span>成长</span>
        </button>
        <button id="tab-memory" type="button" role="tab" aria-selected="false" aria-controls="panel-memory" data-tab="memory" tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 4.5A2.5 2.5 0 0 1 4.5 2H9a3 3 0 0 1 3 3v17a3 3 0 0 0-3-3H2z"></path><path d="M22 4.5A2.5 2.5 0 0 0 19.5 2H15a3 3 0 0 0-3 3v17a3 3 0 0 1 3-3h7z"></path></svg>
          <span>记忆</span>
        </button>
        <button id="tab-guardian" type="button" role="tab" aria-selected="false" aria-controls="panel-guardian" data-tab="guardian" tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 13c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V5l8-3 8 3z"></path><path d="m9 12 2 2 4-4"></path></svg>
          <span>守护</span>
        </button>
      </div>
    </nav>

    <main id="app-main" tabindex="-1">
      <section id="panel-today" class="view-panel" role="tabpanel" aria-labelledby="tab-today" tabindex="0">
        <div class="initial-state" aria-live="polite">正在准备今天的成长手册</div>
      </section>
      <section id="panel-growth" class="view-panel" role="tabpanel" aria-labelledby="tab-growth" tabindex="0" hidden>
        <div class="initial-state" aria-live="polite">切换到成长时加载</div>
      </section>
      <section id="panel-memory" class="view-panel" role="tabpanel" aria-labelledby="tab-memory" tabindex="0" hidden>
        <div class="initial-state" aria-live="polite">切换到记忆时加载</div>
      </section>
      <section id="panel-guardian" class="view-panel" role="tabpanel" aria-labelledby="tab-guardian" tabindex="0" hidden>
        <div class="initial-state" aria-live="polite">切换到守护时加载</div>
      </section>
    </main>
  </div>

  <dialog id="rights-dialog" class="app-dialog" aria-labelledby="rights-title" aria-describedby="rights-body rights-notice">
    <div class="dialog-heading">
      <div>
        <p class="dialog-kicker">数据权利</p>
        <h2 id="rights-title">数据权利说明</h2>
      </div>
      <form method="dialog">
        <button class="icon-button" type="submit" value="close" aria-label="关闭数据权利说明" title="关闭">×</button>
      </form>
    </div>
    <p id="rights-body"></p>
    <p id="rights-notice" class="dialog-notice"></p>
    <div class="rights-scope" aria-label="数据权利范围">
      <div><b>导出共同经历</b><span>通过独立流程提供孩子账户相关数据。</span></div>
      <div><b>账户注销</b><span>停止召回和生成后，再彻底销毁私有数据。</span></div>
      <div><b>普通记忆</b><span>不提供挑着删除来改写共同经历的功能。</span></div>
    </div>
    <form method="dialog" class="dialog-actions">
      <button class="primary-button" type="submit" value="close">我知道了</button>
    </form>
  </dialog>

  <dialog id="boundary-dialog" class="app-dialog" aria-labelledby="boundary-title">
    <div class="dialog-heading">
      <div>
        <p class="dialog-kicker">关系边界</p>
        <h2 id="boundary-title">红线话题</h2>
      </div>
      <form method="dialog">
        <button class="icon-button" type="submit" value="close" aria-label="关闭红线话题说明" title="关闭">×</button>
      </form>
    </div>
    <p>红线只让灵灵以后不主动提起，不会删除或改写已经发生的共同经历。</p>
    <div id="boundary-list" class="boundary-dialog-list"></div>
    <form method="dialog" class="dialog-actions">
      <button class="primary-button" type="submit" value="close">明白了</button>
    </form>
  </dialog>

  <p id="status-announcer" class="sr-only" aria-live="polite"></p>
  <noscript>请启用 JavaScript 查看家长端成长手册。</noscript>
  <script src="/assets/jsQR.js"></script>
  <script type="module" src="/parent/app.mjs"></script>
</body>
</html>
